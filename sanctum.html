<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Alchemist's Sanctum — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- PASTE YOUR FIREBASE CONFIG HERE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ══════════════════════════════════════
    // 🔥 PASTE YOUR FIREBASE CONFIG BELOW
    // ══════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyAP4fgw7E3iHVP-auf6MssYjqDAvqWeUMc",
      authDomain: "stacked-alchemist.firebaseapp.com",
      projectId: "stacked-alchemist",
      storageBucket: "stacked-alchemist.firebasestorage.app",
      messagingSenderId: "194857891975",
      appId: "1:194857891975:web:439aa4cbc87bab9f892022"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    // ══════════════════════════════════════
    // STATE
    // ══════════════════════════════════════
    let allSubmissions = [];
    let filtered       = [];
    let activeFilters  = { type: 'all', budget: 'all', status: 'all', read: 'all', date: 'desc' };

    // ══════════════════════════════════════
    // AUTH STATE
    // ══════════════════════════════════════
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display   = 'block';
        loadSubmissions();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display   = 'none';
      }
    });

    // ══════════════════════════════════════
    // LOGIN
    // ══════════════════════════════════════
    window.attemptLogin = async function() {
      const email = document.getElementById('emailInput').value.trim();
      const pw    = document.getElementById('pwInput').value;
      const err   = document.getElementById('loginError');
      const btn   = document.querySelector('.login-btn');
      err.textContent = '';
      btn.textContent = '⌛ Entering...';
      btn.disabled = true;
      try {
        await signInWithEmailAndPassword(auth, email, pw);
      } catch(e) {
        err.textContent = '✗ Invalid credentials. The sanctum remains sealed.';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').classList.add('shake');
        setTimeout(() => document.getElementById('pwInput').classList.remove('shake'), 500);
        btn.textContent = '◈ Enter the Sanctum';
        btn.disabled = false;
      }
    };

    window.signOutAdmin = async function() {
      await signOut(auth);
    };

    window.handleEnter = function(e) {
      if (e.key === 'Enter') window.attemptLogin();
    };

    // ══════════════════════════════════════
    // LOAD DATA
    // ══════════════════════════════════════
    async function loadSubmissions() {
      showLoading(true);
      try {
        const q = query(collection(db, 'submissions'), orderBy('submittedAt', 'desc'));
        const snap = await getDocs(q);
        allSubmissions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        applyFilters();
        updateStats();
      } catch(e) {
        console.error(e);
        document.getElementById('cardGrid').innerHTML =
          `<div class="empty-state">⚠ Could not connect to the forge. Check your Firebase config.</div>`;
      }
      showLoading(false);
    }

    function showLoading(v) {
      document.getElementById('loadingState').style.display = v ? 'flex' : 'none';
    }

    // ══════════════════════════════════════
    // FILTERS
    // ══════════════════════════════════════
    window.setFilter = function(key, val, el) {
      activeFilters[key] = val;
      // update active button styles
      document.querySelectorAll(`[data-filter="${key}"]`).forEach(b => b.classList.remove('active'));
      if (el) el.classList.add('active');
      applyFilters();
    };

    window.setSort = function(val) {
      activeFilters.date = val;
      applyFilters();
    };

    function applyFilters() {
      filtered = allSubmissions.filter(s => {
        if (activeFilters.type   !== 'all' && s.projType !== activeFilters.type)   return false;
        if (activeFilters.budget !== 'all' && s.budget   !== activeFilters.budget) return false;
        if (activeFilters.status !== 'all' && s.status   !== activeFilters.status) return false;
        if (activeFilters.read   === 'unread' && s.read) return false;
        if (activeFilters.read   === 'read'   && !s.read) return false;
        return true;
      });

      filtered.sort((a, b) => {
        const ta = a.submittedAt?.seconds || 0;
        const tb = b.submittedAt?.seconds || 0;
        return activeFilters.date === 'desc' ? tb - ta : ta - tb;
      });

      renderCards();
      document.getElementById('resultCount').textContent = `${filtered.length} submission${filtered.length !== 1 ? 's' : ''}`;
    }

    // ══════════════════════════════════════
    // RENDER CARDS
    // ══════════════════════════════════════
    function renderCards() {
      const grid = document.getElementById('cardGrid');
      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state">🔮 No submissions match your filters.<br><small>The ravens haven't arrived yet — or they got lost.</small></div>`;
        return;
      }

      grid.innerHTML = filtered.map(s => {
        const date    = s.submittedAt ? new Date(s.submittedAt.seconds * 1000) : new Date();
        const dateStr = date.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        const timeStr = date.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
        const status  = s.status || 'new';
        const isRead  = s.read || false;
        const features = Array.isArray(s.feat) ? s.feat.join(', ') : (s.feat || '—');

        return `
        <div class="card ${isRead ? 'read' : 'unread'} status-${status}" id="card-${s.id}">
          <div class="card-top">
            <div class="card-badges">
              <span class="badge-status ${status}" onclick="cycleStatus('${s.id}', '${status}')">${statusLabel(status)}</span>
              <span class="badge-read ${isRead ? 'read' : 'unread'}" onclick="toggleRead('${s.id}', ${isRead})">${isRead ? '◈ Read' : '⬡ Unread'}</span>
            </div>
            <div class="card-date">${dateStr} · ${timeStr}</div>
          </div>

          <div class="card-header">
            <div class="card-name">${s.name || 'Unknown Client'}</div>
            <div class="card-business">${s.business || ''}</div>
          </div>

          <div class="card-contact">
            ${s.email ? `<a href="mailto:${s.email}" class="contact-link">✉ ${s.email}</a>` : ''}
            ${s.phone ? `<a href="tel:${s.phone}" class="contact-link">📞 ${s.phone}</a>` : ''}
          </div>

          <div class="card-divider"></div>

          <div class="card-grid">
            <div class="card-field">
              <div class="field-label">Project Type</div>
              <div class="field-val">${s.projType || '—'}</div>
            </div>
            <div class="card-field">
              <div class="field-label">Goal</div>
              <div class="field-val">${s.goal || '—'}</div>
            </div>
            <div class="card-field">
              <div class="field-label">Budget</div>
              <div class="field-val highlight">${s.budget || '—'}</div>
            </div>
            <div class="card-field">
              <div class="field-label">Timeline</div>
              <div class="field-val">${s.timeline || '—'}</div>
            </div>
            <div class="card-field">
              <div class="field-label">Pages</div>
              <div class="field-val">${s.pages || '—'}</div>
            </div>
            <div class="card-field">
              <div class="field-label">Style</div>
              <div class="field-val">${s.style || '—'}</div>
            </div>
          </div>

          ${s.bizDesc ? `
          <div class="card-section">
            <div class="field-label">Business Description</div>
            <div class="field-body">${s.bizDesc}</div>
          </div>` : ''}

          ${features !== '—' ? `
          <div class="card-section">
            <div class="field-label">Features Requested</div>
            <div class="field-tags">${(Array.isArray(s.feat) ? s.feat : [s.feat]).map(f => `<span class="tag">${f}</span>`).join('')}</div>
          </div>` : ''}

          ${s.extra ? `
          <div class="card-section">
            <div class="field-label">Additional Notes</div>
            <div class="field-body italic">${s.extra}</div>
          </div>` : ''}

          <div class="card-actions">
            ${s.email ? `<a href="mailto:${s.email}?subject=Re: Your Project Inquiry — Stacked Alchemist" class="card-btn btn-reply">✉ Reply</a>` : ''}
            <button class="card-btn btn-archive" onclick="setStatus('${s.id}', 'archived')">⬡ Archive</button>
          </div>
        </div>`;
      }).join('');
    }

    function statusLabel(s) {
      const map = { new:'⬡ New', inprogress:'◈ In Progress', completed:'✓ Completed', archived:'✗ Archived' };
      return map[s] || '⬡ New';
    }

    // ══════════════════════════════════════
    // STATS
    // ══════════════════════════════════════
    function updateStats() {
      const total    = allSubmissions.length;
      const unread   = allSubmissions.filter(s => !s.read).length;
      const inprog   = allSubmissions.filter(s => s.status === 'inprogress').length;
      const complete = allSubmissions.filter(s => s.status === 'completed').length;
      document.getElementById('statTotal').textContent    = total;
      document.getElementById('statUnread').textContent   = unread;
      document.getElementById('statInProg').textContent   = inprog;
      document.getElementById('statDone').textContent     = complete;
    }

    // ══════════════════════════════════════
    // ACTIONS
    // ══════════════════════════════════════
    window.toggleRead = async function(id, current) {
      try {
        await updateDoc(doc(db, 'submissions', id), { read: !current });
        const s = allSubmissions.find(x => x.id === id);
        if (s) s.read = !current;
        applyFilters();
        updateStats();
      } catch(e) { console.error(e); }
    };

    window.cycleStatus = async function(id, current) {
      const cycle = { new:'inprogress', inprogress:'completed', completed:'archived', archived:'new' };
      const next  = cycle[current] || 'new';
      await window.setStatus(id, next);
    };

    window.setStatus = async function(id, status) {
      try {
        await updateDoc(doc(db, 'submissions', id), { status });
        const s = allSubmissions.find(x => x.id === id);
        if (s) s.status = status;
        applyFilters();
        updateStats();
      } catch(e) { console.error(e); }
    };

    window.refreshDashboard = function() {
      loadSubmissions();
    };

  </script>

  <style>
    :root {
      --teal:    #00ffc8;
      --teal-d:  #00d4a8;
      --gold:    #ffd700;
      --magenta: #ff00aa;
      --void:    #05040a;
      --void-2:  #0a0916;
      --void-3:  #0f0d20;
      --text:    #f0ece0;
      --text-d:  #a098b8;
      --border:  rgba(0,255,200,.2);

      --status-new:        #00ffc8;
      --status-inprogress: #ffd700;
      --status-completed:  #69BE28;
      --status-archived:   #666;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--void);
      color: var(--text);
      font-family: 'Lora', serif;
      min-height: 100vh;
    }

    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,255,200,.008) 2px, rgba(0,255,200,.008) 4px
      );
    }

    /* ══════════════ LOGIN ══════════════ */
    #loginScreen {
      position: fixed; inset: 0; z-index: 100;
      background: var(--void);
      display: flex; align-items: center; justify-content: center;
    }

    .login-box {
      background: var(--void-2);
      border: 1px solid var(--border);
      padding: 48px 40px;
      text-align: center;
      max-width: 380px; width: 90%;
      position: relative;
    }

    .login-box::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, transparent, var(--teal), var(--gold), transparent);
    }

    .login-sigil {
      font-size: 3rem; display:block; margin-bottom:16px;
      animation: spin 20s linear infinite;
      filter: drop-shadow(0 0 12px rgba(0,255,200,.4));
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem; color: var(--teal);
      margin-bottom: 6px; letter-spacing:.06em;
    }

    .login-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: .62rem; color: var(--text-d);
      letter-spacing:.2em; text-transform:uppercase;
      margin-bottom: 28px;
    }

    .pw-input {
      width:100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(0,255,200,.3);
      color: var(--text);
      padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .9rem; letter-spacing:.1em;
      outline:none; margin-bottom:14px;
      transition: border-color .3s, box-shadow .3s;
    }

    .pw-input:focus { border-color: var(--teal); box-shadow: 0 0 16px rgba(0,255,200,.15); }

    .login-btn {
      width:100%;
      font-family: 'Cinzel', serif;
      font-size: .78rem; letter-spacing:.18em;
      text-transform:uppercase;
      padding: 13px;
      background: var(--teal);
      color: var(--void); border:none; cursor:pointer;
      transition: all .3s;
    }

    .login-btn:hover { box-shadow: 0 0 24px rgba(0,255,200,.4); transform:translateY(-2px); }

    .login-error {
      font-family: 'JetBrains Mono', monospace;
      font-size:.62rem; color: var(--magenta);
      margin-top:12px; min-height:18px; letter-spacing:.06em;
    }

    @keyframes shake-kf {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
    .shake { animation: shake-kf .4s ease; }

    /* ══════════════ DASHBOARD ══════════════ */
    #dashboard { display:none; position:relative; z-index:1; }

    /* TOP BAR */
    .topbar {
      position:sticky; top:0; z-index:50;
      background: rgba(5,4,10,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display:flex; align-items:center; justify-content:space-between;
      height:60px;
    }

    .topbar-brand {
      font-family:'Cinzel Decorative',serif;
      font-size:.85rem; color:var(--teal);
      letter-spacing:.08em;
      filter: drop-shadow(0 0 8px rgba(0,255,200,.3));
    }

    .topbar-right {
      display:flex; align-items:center; gap:16px;
    }

    .refresh-btn {
      font-family:'Cinzel',serif; font-size:.65rem;
      letter-spacing:.14em; text-transform:uppercase;
      padding:8px 18px;
      border:1px solid var(--border); color:var(--teal);
      background:transparent; cursor:pointer;
      transition:all .3s;
    }
    .refresh-btn:hover { background:rgba(0,255,200,.08); box-shadow:0 0 12px rgba(0,255,200,.2); }

    .result-count {
      font-family:'JetBrains Mono',monospace;
      font-size:.62rem; color:var(--text-d); letter-spacing:.12em;
    }

    /* STATS ROW */
    .stats-row {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:12px; padding:24px 32px 0;
    }

    @media(max-width:640px) { .stats-row { grid-template-columns:repeat(2,1fr); } }

    .stat-card {
      background:var(--void-2);
      border:1px solid var(--border);
      padding:18px 20px;
      position:relative; overflow:hidden;
    }

    .stat-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
    }

    .stat-card.total::before    { background:var(--teal); }
    .stat-card.unread::before   { background:var(--magenta); }
    .stat-card.inprog::before   { background:var(--gold); }
    .stat-card.done::before     { background:#69BE28; }

    .stat-num {
      font-family:'Cinzel Decorative',serif;
      font-size:2rem; line-height:1;
      margin-bottom:4px;
    }

    .stat-card.total  .stat-num { color:var(--teal); }
    .stat-card.unread .stat-num { color:var(--magenta); }
    .stat-card.inprog .stat-num { color:var(--gold); }
    .stat-card.done   .stat-num { color:#69BE28; }

    .stat-label {
      font-family:'JetBrains Mono',monospace;
      font-size:.58rem; color:var(--text-d);
      letter-spacing:.18em; text-transform:uppercase;
    }

    /* FILTERS */
    .filters-wrap {
      padding:20px 32px;
      background:var(--void-2);
      border-bottom:1px solid var(--border);
      margin-top:20px;
    }

    .filter-row {
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      margin-bottom:10px;
    }

    .filter-row:last-child { margin-bottom:0; }

    .filter-label {
      font-family:'JetBrains Mono',monospace;
      font-size:.58rem; color:var(--text-d);
      letter-spacing:.18em; text-transform:uppercase;
      min-width:80px;
    }

    .filter-btn {
      font-family:'Cinzel',serif; font-size:.62rem;
      letter-spacing:.1em; text-transform:uppercase;
      padding:5px 14px;
      border:1px solid rgba(255,255,255,.1);
      color:var(--text-d); background:transparent;
      cursor:pointer; transition:all .2s;
    }

    .filter-btn:hover { border-color:var(--teal); color:var(--teal); }
    .filter-btn.active { border-color:var(--teal); color:var(--void); background:var(--teal); }

    .filter-btn.f-inprogress.active { background:var(--gold);    border-color:var(--gold);    color:var(--void); }
    .filter-btn.f-completed.active  { background:#69BE28;        border-color:#69BE28;        color:var(--void); }
    .filter-btn.f-archived.active   { background:#555;           border-color:#555;           color:var(--text); }
    .filter-btn.f-unread.active     { background:var(--magenta); border-color:var(--magenta); color:#fff; }

    /* CARD GRID */
    .content-wrap { padding:24px 32px 80px; }

    #cardGrid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(340px,1fr));
      gap:20px;
    }

    @media(max-width:720px) { #cardGrid { grid-template-columns:1fr; } .content-wrap { padding:20px 16px 80px; } }

    /* CARD */
    .card {
      background:var(--void-2);
      border:1px solid var(--border);
      padding:24px;
      position:relative; overflow:hidden;
      transition:border-color .3s, box-shadow .3s;
    }

    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg, var(--teal), var(--magenta));
      transition:opacity .3s;
    }

    .card.unread { border-color:rgba(0,255,200,.35); box-shadow:0 0 20px rgba(0,255,200,.06); }
    .card.read   { border-color:rgba(255,255,255,.08); opacity:.85; }
    .card.read::before { opacity:.3; }

    .card.status-inprogress::before { background:linear-gradient(90deg,var(--gold),var(--teal)); }
    .card.status-completed::before  { background:linear-gradient(90deg,#69BE28,var(--teal)); }
    .card.status-archived::before   { background:#333; }

    .card-top {
      display:flex; justify-content:space-between;
      align-items:flex-start; gap:8px; margin-bottom:14px;
      flex-wrap:wrap;
    }

    .card-badges { display:flex; gap:6px; flex-wrap:wrap; }

    .badge-status {
      font-family:'JetBrains Mono',monospace; font-size:.58rem;
      letter-spacing:.12em; text-transform:uppercase;
      padding:3px 10px; cursor:pointer;
      transition:all .2s; border:1px solid;
    }

    .badge-status.new         { border-color:var(--teal);    color:var(--teal); }
    .badge-status.inprogress  { border-color:var(--gold);    color:var(--gold); }
    .badge-status.completed   { border-color:#69BE28;        color:#69BE28; }
    .badge-status.archived    { border-color:#555;           color:#777; }

    .badge-read {
      font-family:'JetBrains Mono',monospace; font-size:.58rem;
      letter-spacing:.1em; padding:3px 10px;
      cursor:pointer; border:1px solid;
      transition:all .2s;
    }
    .badge-read.unread { border-color:var(--magenta); color:var(--magenta); }
    .badge-read.read   { border-color:rgba(255,255,255,.15); color:var(--text-d); }

    .card-date {
      font-family:'JetBrains Mono',monospace; font-size:.58rem;
      color:var(--text-d); letter-spacing:.06em;
      white-space:nowrap;
    }

    .card-header { margin-bottom:10px; }

    .card-name {
      font-family:'Cinzel',serif; font-size:1rem;
      color:var(--text); letter-spacing:.06em; font-weight:600;
    }

    .card-business {
      font-family:'Lora',serif; font-size:.82rem;
      color:var(--text-d); font-style:italic; margin-top:2px;
    }

    .card-contact {
      display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px;
    }

    .contact-link {
      font-family:'JetBrains Mono',monospace; font-size:.62rem;
      color:var(--teal); text-decoration:none; letter-spacing:.06em;
      transition:color .2s;
    }
    .contact-link:hover { color:#fff; }

    .card-divider {
      height:1px;
      background:linear-gradient(90deg,transparent,var(--border),transparent);
      margin:14px 0;
    }

    .card-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:10px; margin-bottom:14px;
    }

    .card-field { background:rgba(255,255,255,.03); padding:8px 12px; }

    .field-label {
      font-family:'JetBrains Mono',monospace; font-size:.54rem;
      color:var(--teal-d); letter-spacing:.16em;
      text-transform:uppercase; margin-bottom:3px;
    }

    .field-val {
      font-family:'Cinzel',serif; font-size:.72rem;
      color:var(--text); letter-spacing:.04em;
    }

    .field-val.highlight { color:var(--gold); font-weight:600; }

    .card-section { margin-bottom:12px; }

    .field-body {
      font-family:'Lora',serif; font-size:.82rem;
      color:var(--text-d); line-height:1.7; margin-top:4px;
    }

    .field-body.italic { font-style:italic; }

    .field-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }

    .tag {
      font-family:'JetBrains Mono',monospace; font-size:.55rem;
      letter-spacing:.1em; text-transform:uppercase;
      padding:3px 10px;
      border:1px solid rgba(0,255,200,.2);
      color:var(--teal-d);
      background:rgba(0,255,200,.04);
    }

    .card-actions {
      display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;
    }

    .card-btn {
      font-family:'Cinzel',serif; font-size:.62rem;
      letter-spacing:.12em; text-transform:uppercase;
      padding:8px 18px; border:1px solid;
      cursor:pointer; background:transparent;
      transition:all .2s; text-decoration:none;
      display:inline-block;
    }

    .btn-reply   { border-color:var(--teal);    color:var(--teal); }
    .btn-archive { border-color:rgba(255,255,255,.15); color:var(--text-d); }

    .btn-reply:hover   { background:rgba(0,255,200,.08); box-shadow:0 0 12px rgba(0,255,200,.2); }
    .btn-archive:hover { border-color:#555; color:#777; }

    /* EMPTY / LOADING */
    .empty-state {
      grid-column:1/-1; text-align:center;
      padding:80px 20px;
      font-family:'Cinzel',serif; font-size:1rem;
      color:var(--text-d); line-height:2; letter-spacing:.06em;
    }

    #loadingState {
      display:none; position:fixed; inset:0; z-index:200;
      background:rgba(5,4,10,.8);
      align-items:center; justify-content:center;
      flex-direction:column; gap:16px;
    }

    .loading-sigil {
      font-size:3rem;
      animation:spin 2s linear infinite;
      filter:drop-shadow(0 0 16px rgba(0,255,200,.5));
    }

    .loading-text {
      font-family:'JetBrains Mono',monospace;
      font-size:.7rem; color:var(--teal);
      letter-spacing:.25em; text-transform:uppercase;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--void); }
    ::-webkit-scrollbar-thumb { background:var(--teal-d); }

    @media(max-width:640px) {
      .topbar { padding:0 16px; }
      .stats-row { padding:16px; }
      .filters-wrap { padding:16px; }
      .filter-label { min-width:60px; font-size:.52rem; }
    }
  </style>
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div id="loadingState">
    <div class="loading-sigil">⚗</div>
    <div class="loading-text">Consulting the forge...</div>
  </div>

  <!-- ══════════════════════════ -->
  <!-- LOGIN SCREEN              -->
  <!-- ══════════════════════════ -->
  <div id="loginScreen">
    <div class="login-box">
      <span class="login-sigil">⚗</span>
      <div class="login-title">The Alchemist's Sanctum</div>
      <div class="login-sub">// Admin Access Only</div>
      <input
        type="email"
        id="emailInput"
        class="pw-input"
        placeholder="Email address..."
        onkeydown="handleEnter(event)"
        autocomplete="email"
        style="margin-bottom:10px;"
      />
      <input
        type="password"
        id="pwInput"
        class="pw-input"
        placeholder="Password..."
        onkeydown="handleEnter(event)"
        autocomplete="current-password"
      />
      <button class="login-btn" onclick="attemptLogin()">◈ Enter the Sanctum</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- ══════════════════════════ -->
  <!-- DASHBOARD                 -->
  <!-- ══════════════════════════ -->
  <div id="dashboard">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-brand">⚗ The Sanctum</div>
      <div class="topbar-right">
        <span class="result-count" id="resultCount">0 submissions</span>
        <button class="refresh-btn" onclick="refreshDashboard()">↺ Refresh</button>
        <button class="refresh-btn" onclick="signOutAdmin()" style="margin-left:8px;opacity:.7;">⊘ Sign Out</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card total">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total Inquiries</div>
      </div>
      <div class="stat-card unread">
        <div class="stat-num" id="statUnread">0</div>
        <div class="stat-label">Unread</div>
      </div>
      <div class="stat-card inprog">
        <div class="stat-num" id="statInProg">0</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card done">
        <div class="stat-num" id="statDone">0</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters-wrap">

      <div class="filter-row">
        <span class="filter-label">Status</span>
        <button class="filter-btn active" data-filter="status" onclick="setFilter('status','all',this)">All</button>
        <button class="filter-btn f-new"        data-filter="status" onclick="setFilter('status','new',this)">⬡ New</button>
        <button class="filter-btn f-inprogress" data-filter="status" onclick="setFilter('status','inprogress',this)">◈ In Progress</button>
        <button class="filter-btn f-completed"  data-filter="status" onclick="setFilter('status','completed',this)">✓ Completed</button>
        <button class="filter-btn f-archived"   data-filter="status" onclick="setFilter('status','archived',this)">✗ Archived</button>
      </div>

      <div class="filter-row">
        <span class="filter-label">Read</span>
        <button class="filter-btn active" data-filter="read" onclick="setFilter('read','all',this)">All</button>
        <button class="filter-btn f-unread" data-filter="read" onclick="setFilter('read','unread',this)">⬡ Unread</button>
        <button class="filter-btn"         data-filter="read" onclick="setFilter('read','read',this)">◈ Read</button>
      </div>

      <div class="filter-row">
        <span class="filter-label">Type</span>
        <button class="filter-btn active" data-filter="type" onclick="setFilter('type','all',this)">All</button>
        <button class="filter-btn" data-filter="type" onclick="setFilter('type','landing',this)">Landing</button>
        <button class="filter-btn" data-filter="type" onclick="setFilter('type','business',this)">Business</button>
        <button class="filter-btn" data-filter="type" onclick="setFilter('type','portfolio',this)">Portfolio</button>
        <button class="filter-btn" data-filter="type" onclick="setFilter('type','dashboard',this)">Dashboard</button>
        <button class="filter-btn" data-filter="type" onclick="setFilter('type','ecomm',this)">E-Commerce</button>
      </div>

      <div class="filter-row">
        <span class="filter-label">Budget</span>
        <button class="filter-btn active" data-filter="budget" onclick="setFilter('budget','all',this)">All</button>
        <button class="filter-btn" data-filter="budget" onclick="setFilter('budget','under100',this)">&lt;$100</button>
        <button class="filter-btn" data-filter="budget" onclick="setFilter('budget','100-250',this)">$100–250</button>
        <button class="filter-btn" data-filter="budget" onclick="setFilter('budget','250-500',this)">$250–500</button>
        <button class="filter-btn" data-filter="budget" onclick="setFilter('budget','500+',this)">$500+</button>
      </div>

      <div class="filter-row">
        <span class="filter-label">Sort</span>
        <button class="filter-btn active" onclick="setSort('desc')">Newest First</button>
        <button class="filter-btn" onclick="setSort('asc')">Oldest First</button>
      </div>

    </div>

    <!-- CARDS -->
    <div class="content-wrap">
      <div id="cardGrid">
        <div class="empty-state">
          ⚗ Loading submissions from the forge...<br>
          <small style="font-size:.7rem;opacity:.5">// Consulting Firebase</small>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
